name: CI

# Build the library and run the test suite on every push and pull request.

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore test/AwsContainerInspection.Tests/AwsContainerInspection.Tests.csproj

      - name: Build
        run: dotnet build test/AwsContainerInspection.Tests/AwsContainerInspection.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test test/AwsContainerInspection.Tests/AwsContainerInspection.Tests.csproj -c Release --no-build --verbosity normal
